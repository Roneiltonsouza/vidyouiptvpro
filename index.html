<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel VidYou</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        .painel { width: 90%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 2px solid #ff4500; }
        h1 { color: #ff4500; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #ff4500; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4500; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="painel">
    <h1>EMISSOR DE LISTAS VIDYOU</h1>
    <input type="password" id="ghToken" placeholder="Seu Token (ghp_...)">
    <input type="text" id="ghRepo" placeholder="usuario/repositorio" value="roneiltonsouza/vidyou-iptv">
    <textarea id="m3uLink" placeholder="Link da Lista M3U"></textarea>
    <button id="btnAtu" onclick="atualizar()">ATUALIZAR TODOS OS USUÁRIOS</button>
    <div id="msg" style="text-align:center; margin-top:15px; color:#ff4500;"></div>
</div>
<script>
    async function atualizar() {
        const token = document.getElementById('ghToken').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();
        const link = document.getElementById('m3uLink').value.trim();
        const msg = document.getElementById('msg');
        const btn = document.getElementById('btnAtu');

        if(!token || !link) { msg.innerText = "⚠️ Preencha o Token e o Link!"; return; }

        msg.innerText = "⏳ Sincronizando...";
        btn.disabled = true;

        try {
            const url = `https://api.github.com/repos/${repo}/contents/lista.txt`;
            let sha = null;

            // Tenta obter o arquivo para pegar o SHA (necessário para update)
            const resGet = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (resGet.ok) {
                const data = await resGet.json();
                sha = data.sha;
            }

            // Codificação segura para evitar erros de caracteres especiais
            const contentB64 = btoa(unescape(encodeURIComponent(link)));

            const resUpdate = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Atualização de lista via Painel",
                    content: contentB64,
                    sha: sha
                })
            });

            if (resUpdate.ok) {
                msg.style.color = "#00ff00";
                msg.innerText = "✅ Sincronizado!";
            } else {
                const err = await resUpdate.json();
                msg.innerText = "❌ Erro: " + err.message;
            }
        } catch (e) {
            msg.innerText = "❌ Falha na comunicação.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
