<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - V2</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, #4b0082, #ff4500); border-bottom: 2px solid #ff4500; z-index: 100; }
        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-cast-active { border-color: #00ff00; color: #00ff00; }
        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .seta-canais { position: absolute; top: 20px; left: 20px; z-index: 200; background: rgba(0, 0, 0, 0.7); color: #ff4500; border: 2px solid #ff4500; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; opacity: 1; }
        .seta-canais.invisivel { opacity: 0; pointer-events: none; }
        #gaveta { position: absolute; top: 0; left: -310px; width: 300px; height: 100%; background: rgba(10, 10, 10, 0.98); z-index: 2147483647; transition: 0.4s; border-right: 3px solid #ff4500; overflow-y: hidden; display: flex; flex-direction: column; }
        #gaveta.ativa { left: 0; }
        .search-container { padding: 10px; background: #1a1a1a; }
        #search-input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ff4500; background: #000; color: #fff; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .tabs-container { display: flex; gap: 5px; padding: 0 10px 10px; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 8px 2px; font-size: 0.7rem; font-weight: bold; background: #222; border: 1px solid #444; color: #aaa; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: #ff4500; color: #000; border-color: #fff; }
        #itens-canais { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        .canal-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .canal-item:hover { background: #ff4500; color: #000; font-weight: bold; }
        .canal-logo { width: 100px; height: 100px; border-radius: 8px; object-fit: contain; background: #fff; flex-shrink: 0; }
        .canal-item span { font-size: 1.15rem; }
        #itens-canais::-webkit-scrollbar { width: 6px; }
        #itens-canais::-webkit-scrollbar-thumb { background: #ff4500; border-radius: 10px; }
    </style>
</head>
<body>
<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.2rem;">VidYou <span style="color:#000">IPTV</span></div>
    <div style="display:flex; gap:5px;">
        <button class="btn-header" id="btnConectarTV" onclick="conectarTV()">📺 CONECTAR TV</button>
        <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 ABRIR</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">
</header>
<div id="player-wrapper">
    <video id="vid" controls autoplay playsinline></video>
    <button class="seta-canais" id="botaoSeta" onclick="abrirGaveta()">▼</button>
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR MENU X</div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Buscar..." onkeyup="filtrarGeral()">
        </div>
        <div class="tabs-container">
            <button class="tab-btn active" id="btn-tv" onclick="setTab('tv')">📺 TV Online</button>
            <button class="tab-btn" id="btn-filmes" onclick="setTab('filmes')">🎬 Filmes</button>
            <button class="tab-btn" id="btn-series" onclick="setTab('series')">🍿 Séries</button>
        </div>
        <div id="itens-canais"></div>
    </div>
</div>
<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    let hls = null; let listaCanais = []; let abaAtual = 'tv'; let castSession = null;
    const video = document.getElementById('vid');

    async function buscarLista() {
        try {
            // O "?t=" impede que o navegador leia uma versão antiga (cache)
            const res = await fetch(URL_GITHUB + "?t=" + Date.now());
            const linkM3U = (await res.text()).trim();
            if (linkM3U.startsWith("http")) {
                const resM3U = await fetch(linkM3U);
                const text = await resM3U.text();
                parseM3U(text);
            }
        } catch (e) { console.log("Erro na busca."); }
    }

    function parseM3U(text) {
        const lines = text.split('\n'); listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const nome = lines[i].split(',')[1] || "Sem Nome";
                const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || '';
                const grupo = lines[i].match(/group-title="([^"]+)"/)?.[1] || "";
                const link = lines[i+1]?.trim();
                if (link && link.startsWith('http')) {
                    let tipo = 'tv';
                    const info = (nome + grupo).toLowerCase();
                    if (info.includes('filmes')) tipo = 'filmes';
                    else if (info.includes('série')) tipo = 'series';
                    listaCanais.push({ nome, logo, link, tipo });
                }
            }
        }
        filtrarGeral();
    }

    function configurarPlayer(url) {
        if (hls) hls.destroy();
        if (Hls.isSupported() && url.includes('m3u8')) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = url; video.play(); }
    }

    function filtrarGeral() {
        const termo = document.getElementById('search-input').value.toLowerCase();
        const filtrados = listaCanais.filter(c => c.nome.toLowerCase().includes(termo) && c.tipo === abaAtual);
        const container = document.getElementById('itens-canais');
        container.innerHTML = filtrados.map(c => `
            <div class="canal-item" onclick="tocarDireto('${c.link}', '${c.nome}')">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/100'">
                <span>${c.nome}</span>
            </div>`).join('');
    }

    function tocarDireto(url, nome) { configurarPlayer(url); fecharGaveta(); }
    function abrirGaveta() { document.getElementById('gaveta').classList.add('ativa'); }
    function fecharGaveta() { document.getElementById('gaveta').classList.remove('ativa'); }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById('player-wrapper').requestFullscreen(); else document.exitFullscreen(); }
    
    window.onload = () => { buscarLista(); setInterval(buscarLista, 60000); };
</script>
</body>
</html>
