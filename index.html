<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, #4b0082, #ff4500); border-bottom: 2px solid #ff4500; }
        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; }
        video { width: 100%; height: 100%; }
        .seta-canais { position: absolute; top: 20px; left: 20px; z-index: 200; background: rgba(0,0,0,0.7); color: #ff4500; border: 2px solid #ff4500; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; }
        #gaveta { position: absolute; top: 0; left: -310px; width: 300px; height: 100%; background: #0a0a0a; z-index: 300; transition: 0.4s; border-right: 3px solid #ff4500; display: flex; flex-direction: column; }
        #gaveta.ativa { left: 0; }
        .tabs-container { display: flex; padding: 10px; gap: 5px; }
        .tab-btn { flex: 1; padding: 10px 5px; font-size: 10px; font-weight: bold; background: #222; color: #aaa; border: 1px solid #444; cursor: pointer; }
        .tab-btn.active { background: #ff4500; color: #000; }
        #itens-canais { flex: 1; overflow-y: auto; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .canal-logo { width: 60px; height: 60px; object-fit: contain; background: #fff; border-radius: 5px; }
    </style>
</head>
<body>
<header><div style="font-weight: 900;">VidYou IPTV PRO</div></header>
<div id="player-wrapper">
    <video id="vid" controls autoplay></video>
    <button class="seta-canais" onclick="document.getElementById('gaveta').classList.add('ativa')">▼</button>
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer;" onclick="this.parentElement.classList.remove('ativa')">FECHAR X</div>
        <div class="tabs-container">
            <button class="tab-btn active" id="t-tv" onclick="setTab('tv')">TV ONLINE</button>
            <button class="tab-btn" id="t-filmes" onclick="setTab('filmes')">FILMES</button>
            <button class="tab-btn" id="t-series" onclick="setTab('series')">SÉRIES</button>
        </div>
        <div id="itens-canais"></div>
    </div>
</div>
<script>
    const URL_LISTA_TXT = "https://raw.githubusercontent.com/Roneiltonsouza/vidyouiptvpro/main/lista.txt";
    let listaCanais = []; let abaAtual = 'tv'; let hls = null; const video = document.getElementById('vid');
    async function carregar() {
        try {
            const r = await fetch(URL_LISTA_TXT + "?t=" + Date.now());
            const urlM3U = (await r.text()).trim();
            const rm3u = await fetch(urlM3U);
            const texto = await rm3u.text();
            parse(texto);
        } catch(e) { console.log(e); }
    }
    function parse(data) {
        const lines = data.split('\n'); listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const nome = lines[i].split(',')[1] || "Canal";
                const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || '';
                const group = lines[i].match(/group-title="([^"]+)"/)?.[1] || '';
                const link = lines[i+1]?.trim();
                if (link && link.startsWith('http')) {
                    let tipo = 'tv';
                    const s = (nome + group).toLowerCase();
                    if (s.includes('filme') || s.includes('cinema')) tipo = 'filmes';
                    else if (s.includes('série') || s.includes('series')) tipo = 'series';
                    listaCanais.push({ nome, logo, link, tipo });
                }
            }
        }
        render();
    }
    function setTab(t) {
        abaAtual = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
        render();
    }
    function render() {
        const container = document.getElementById('itens-canais');
        const filtrados = listaCanais.filter(c => c.tipo === abaAtual);
        container.innerHTML = filtrados.map(c => `
            <div class="canal-item" onclick="play('${c.link}')">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/60'">
                <span>${c.nome}</span>
            </div>`).join('');
    }
    function play(url) {
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = url; }
        document.getElementById('gaveta').classList.remove('ativa');
    }
    window.onload = carregar;
</script>
</body>
</html>
